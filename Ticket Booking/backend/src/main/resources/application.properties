# Server Configuration
spring.application.name=movie-ticket-booking
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ticket_booking?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=ticketuser
spring.datasource.password=ticketpass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.ticketbooking=DEBUG

# CORS
cors.allowed.origins=http://localhost:3000,http://localhost:5173

