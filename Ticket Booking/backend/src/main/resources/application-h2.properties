# Server Configuration
spring.application.name=movie-ticket-booking
server.port=8080

# H2 File-Based Database (persists data to disk!)
spring.datasource.url=jdbc:h2:file:./data/ticket_booking;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.ticketbooking=DEBUG

# CORS
cors.allowed.origins=http://localhost:3000,http://localhost:5173

